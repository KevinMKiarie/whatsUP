services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: whatsup
      POSTGRES_PASSWORD: whatsup
      POSTGRES_DB: whatsup
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ollama: using the host's local Ollama installation instead of a container
  # to avoid port conflicts with the locally-installed models.
  # Start Ollama locally with: ollama serve
  # Pull a model:              ollama pull qwen2.5:latest

  evolution:
    image: ghcr.io/evolutionapi/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution-secret}
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      LOG_LEVEL: ERROR
    volumes:
      - evolution_data:/evolution/instances

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://whatsup:whatsup@postgres:5432/whatsup
      OLLAMA_URL: http://host.docker.internal:11434/v1
      EVOLUTION_API_URL: http://evolution:8080
    depends_on:
      - postgres
      - evolution

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:3001/api
    depends_on:
      - api

volumes:
  postgres_data:
  evolution_data:
